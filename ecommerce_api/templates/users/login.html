<!DOCTYPE html>
<html>
<head>
  <title>Auth</title>
</head>
<body>

  <h2>Register</h2>

  <input type="text" id="reg_username" placeholder="username">
  <input type="email" id="reg_email" placeholder="email">
  <input type="password" id="reg_password" placeholder="password">

  <button onclick="register()">Registrarse</button>

  <p id="reg_msg"></p>

  <hr>

  <h2>Login</h2>

  <input type="text" id="log_username" placeholder="username">
  <input type="password" id="log_password" placeholder="password">

  <button onclick="login()">Entrar</button>

  <p id="log_msg"></p>

<script>

const BASE_URL = "http://127.0.0.1:8000/api/users";


// 🔥 REGISTER
async function register() {
    const username = document.getElementById("reg_username").value;
    const email = document.getElementById("reg_email").value;
    const password = document.getElementById("reg_password").value;

    const response = await fetch(`${BASE_URL}/register/`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username,
            email,
            password
        })
    });

    const data = await response.json();

    if (response.ok) {
        document.getElementById("reg_msg").innerText = "Registro exitoso ✔";
        console.log(data);
    } else {
        document.getElementById("reg_msg").innerText = "Error en registro ❌";
        console.log(data);
    }
}


// 🔥 LOGIN
async function login() {
    const username = document.getElementById("log_username").value;
    const password = document.getElementById("log_password").value;

    const response = await fetch(`${BASE_URL}/token/`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username,
            password
        })
    });

    const data = await response.json();

    if (response.ok) {
        localStorage.setItem("access", data.access);
        localStorage.setItem("refresh", data.refresh);

        document.getElementById("log_msg").innerText = "Login correcto ✔";
        console.log("TOKEN:", data.access);
    } else {
        document.getElementById("log_msg").innerText = "Error de login ❌";
        console.log(data);
    }
}

</script>

</body>
</html>
