{% extends "base.html" %}
{% block title %}Pedido confirmado — MYA{% endblock %}

{% block content %}
<div style="min-height:60vh;display:flex;align-items:center;justify-content:center;padding:3rem 1rem;text-align:center">
  <div style="max-width:480px">

    <div style="width:64px;height:64px;border-radius:50%;background:#f0fdf4;border:2px solid #86efac;
                display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem">
      <i class="bi bi-check-lg" style="font-size:1.8rem;color:#16a34a"></i>
    </div>

    <h1 style="font-family:var(--font-display);font-size:1.6rem;margin-bottom:.5rem">
      ¡Pedido confirmado!
    </h1>
    <p style="color:var(--clr-muted);font-size:.9rem;margin-bottom:.5rem">
      Orden <strong>#{{ order_id }}</strong>
    </p>
    <p style="color:var(--clr-muted);font-size:.85rem;margin-bottom:2rem">
      Nos comunicaremos pronto para coordinar la entrega.
    </p>

    <div style="display:flex;flex-direction:column;gap:.75rem;align-items:center">
      <a href="/api/orders/{{ order_id }}/invoice/"
         style="display:inline-block;padding:.85rem 2rem;background:var(--clr-text);color:#fff;
                text-decoration:none;border-radius:var(--radius);font-size:.82rem;
                font-weight:500;letter-spacing:.14em;text-transform:uppercase">
        <i class="bi bi-file-earmark-pdf"></i> Descargar comprobante
      </a>

      <a href="{% url 'home' %}"
         style="display:inline-block;padding:.7rem 1.5rem;color:var(--clr-text);
                text-decoration:underline;font-size:.8rem">
        Seguir comprando
      </a>
    </div>

  </div>
</div>
{% endblock %}
