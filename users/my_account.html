{% extends "base.html" %}
{% load static %}
{% block title %}Mi Cuenta — MYA{% endblock %}

{% block extra_css %}
<style>
  .account-page-header {
    background: var(--clr-beige);
    padding: 3rem 0 2rem;
    border-bottom: 1px solid var(--clr-border);
  }
  .account-page-title {
    font-family: var(--font-display);
    font-size: clamp(1.8rem, 3.5vw, 2.6rem);
    font-weight: 400;
  }

  .account-layout {
    padding: 2.5rem 0 4rem;
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 2.5rem;
    align-items: start;
  }
  @media (max-width: 768px) {
    .account-layout { grid-template-columns: 1fr; }
  }

  .account-avatar-block {
    text-align: center;
    background: var(--clr-surface);
    border: 1px solid var(--clr-border);
    border-radius: var(--radius);
    padding: 1.5rem 1rem;
  }
  .account-avatar {
    width: 88px; height: 88px;
    border-radius: 50%;
    background: var(--clr-text);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem; font-weight: 600;
    margin: 0 auto 1rem;
    overflow: hidden;
  }
  .account-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .account-name { font-weight: 600; font-size: .95rem; margin-bottom: .2rem; }
  .account-email { font-size: .8rem; color: var(--clr-muted); word-break: break-word; }

  .account-card {
    background: var(--clr-surface);
    border: 1px solid var(--clr-border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    padding: 1.5rem 1.5rem 1.75rem;
    margin-bottom: 1.5rem;
  }
  .account-card-title {
    font-size: .8rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--clr-muted);
    margin-bottom: 1.25rem;
    padding-bottom: .75rem;
    border-bottom: 1px solid var(--clr-border);
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  @media (max-width: 560px) { .form-grid { grid-template-columns: 1fr; } }

  .form-field { margin-bottom: 1rem; }
  .form-field label {
    font-size: .72rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--clr-muted);
    display: block;
    margin-bottom: .4rem;
  }
  .form-field input, .form-field textarea {
    width: 100%;
    padding: .65rem .85rem;
    border: 1px solid var(--clr-border);
    border-radius: var(--radius);
    font-size: .88rem;
    font-family: var(--font-body);
    background: var(--clr-bg);
    color: var(--clr-text);
    outline: none;
    box-sizing: border-box;
    transition: border-color var(--transition);
  }
  .form-field input:focus, .form-field textarea:focus { border-color: var(--clr-text); }
  .form-field input[disabled] { color: var(--clr-muted); cursor: not-allowed; }

  .btn-save {
    padding: .75rem 1.75rem;
    background: var(--clr-text);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: .78rem;
    font-weight: 500;
    letter-spacing: .1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity var(--transition);
  }
  .btn-save:hover { opacity: .85; }
  .btn-save:disabled { opacity: .5; cursor: not-allowed; }

  .form-message {
    font-size: .82rem;
    margin-top: .9rem;
    padding: .65rem .9rem;
    border-radius: var(--radius);
    display: none;
  }
  .form-message.show { display: block; }
  .form-message.success { background: #dcfce7; color: #166534; }
  .form-message.error   { background: #fee2e2; color: #991b1b; }
</style>
{% endblock %}

{% block content %}

<div class="account-page-header">
  <div class="container-xl px-3 px-md-4">
    <h1 class="account-page-title">Mi Cuenta</h1>
  </div>
</div>

<div class="container-xl px-3 px-md-4">
  <div class="account-layout">

    <!-- Columna izquierda: avatar -->
    <div class="account-avatar-block">
      <div class="account-avatar" id="accountAvatar">…</div>
      <div class="account-name" id="accountName">—</div>
      <div class="account-email" id="accountEmail">—</div>
    </div>

    <!-- Columna derecha: formularios -->
    <div>

      <!-- Datos personales -->
      <div class="account-card">
        <div class="account-card-title">Datos personales</div>
        <form id="profileForm">
          <div class="form-grid">
            <div class="form-field">
              <label for="profFirstName">Nombre</label>
              <input type="text" id="profFirstName" />
            </div>
            <div class="form-field">
              <label for="profLastName">Apellido</label>
              <input type="text" id="profLastName" />
            </div>
          </div>

          <div class="form-field">
            <label for="profEmail">Correo electrónico</label>
            <input type="email" id="profEmail" disabled />
          </div>

          <div class="form-field">
            <label for="profPhone">Teléfono</label>
            <input type="text" id="profPhone" placeholder="+595 981 000000" />
          </div>

          <div class="form-field">
            <label for="profAddress">Dirección</label>
            <textarea id="profAddress" rows="2" placeholder="Av. Mariscal López 1234"></textarea>
          </div>

          <button type="submit" class="btn-save" id="btnSaveProfile">Guardar cambios</button>
          <div class="form-message" id="profileMsg"></div>
        </form>
      </div>

      <!-- Cambiar contraseña -->
      <div class="account-card">
        <div class="account-card-title">Cambiar contraseña</div>
        <form id="passwordForm">
          <div class="form-field">
            <label for="pwCurrent">Contraseña actual</label>
            <input type="password" id="pwCurrent" />
          </div>
          <div class="form-grid">
            <div class="form-field">
              <label for="pwNew">Nueva contraseña</label>
              <input type="password" id="pwNew" />
            </div>
            <div class="form-field">
              <label for="pwNew2">Confirmar nueva contraseña</label>
              <input type="password" id="pwNew2" />
            </div>
          </div>

          <button type="submit" class="btn-save" id="btnSavePassword">Actualizar contraseña</button>
          <div class="form-message" id="passwordMsg"></div>
        </form>
      </div>

    </div>
  </div>
</div>

{% endblock %}

{% block extra_js %}
<script src="{% static 'js/my-account.js' %}"></script>
{% endblock %}
