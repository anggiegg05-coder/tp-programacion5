{% extends "base.html" %}
{% load static %}
{% block title %}Crear cuenta — MYA{% endblock %}

{% block content %}
<div style="min-height:70vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem">
  <div style="width:100%;max-width:440px">

    <!-- Logo -->
    <div style="text-align:center;margin-bottom:2rem">
      <a href="{% url 'home' %}"
         style="font-family:var(--font-display);font-size:1.8rem;letter-spacing:.2em;text-transform:uppercase;color:var(--clr-text);text-decoration:none">
        MYA
      </a>
      <p style="margin-top:.5rem;font-size:.85rem;color:var(--clr-muted)">
        Creá tu cuenta para comprar
      </p>
    </div>

    <!-- Card -->
    <div style="background:var(--clr-surface);border:1px solid var(--clr-border);border-radius:var(--radius);padding:2rem">

      <!-- Error global -->
      <div id="regError"
           style="display:none;background:#fef2f2;border:1px solid #fecaca;border-radius:var(--radius);
                  padding:.75rem 1rem;margin-bottom:1.25rem;font-size:.85rem;color:#dc2626">
      </div>

      <!-- Nombre + Apellido -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem">
        <div>
          <label style="font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--clr-muted);display:block;margin-bottom:.4rem">
            Nombre <span style="color:#e74c3c">*</span>
          </label>
          <input type="text" id="regFirstName" autocomplete="given-name"
                 style="width:100%;padding:.7rem .875rem;border:1px solid var(--clr-border);
                        border-radius:var(--radius);font-size:.88rem;font-family:var(--font-body);
                        background:var(--clr-bg);color:var(--clr-text);outline:none;box-sizing:border-box"
                 placeholder="María" />
        </div>
        <div>
          <label style="font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--clr-muted);display:block;margin-bottom:.4rem">
            Apellido <span style="color:#e74c3c">*</span>
          </label>
          <input type="text" id="regLastName" autocomplete="family-name"
                 style="width:100%;padding:.7rem .875rem;border:1px solid var(--clr-border);
                        border-radius:var(--radius);font-size:.88rem;font-family:var(--font-body);
                        background:var(--clr-bg);color:var(--clr-text);outline:none;box-sizing:border-box"
                 placeholder="González" />
        </div>
      </div>

      <!-- Email -->
      <div style="margin-bottom:1rem">
        <label style="font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--clr-muted);display:block;margin-bottom:.4rem">
          Correo electrónico <span style="color:#e74c3c">*</span>
        </label>
        <input type="email" id="regEmail" autocomplete="email"
               style="width:100%;padding:.7rem .875rem;border:1px solid var(--clr-border);
                      border-radius:var(--radius);font-size:.88rem;font-family:var(--font-body);
                      background:var(--clr-bg);color:var(--clr-text);outline:none;box-sizing:border-box"
               placeholder="correo@ejemplo.com" />
        <small style="font-size:.72rem;color:var(--clr-muted);margin-top:.3rem;display:block">
          Puede ser ficticio para pruebas
        </small>
      </div>

      <!-- Contraseña -->
      <div style="margin-bottom:1rem">
        <label style="font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--clr-muted);display:block;margin-bottom:.4rem">
          Contraseña <span style="color:#e74c3c">*</span>
        </label>
        <input type="password" id="regPassword" autocomplete="new-password"
               style="width:100%;padding:.7rem .875rem;border:1px solid var(--clr-border);
                      border-radius:var(--radius);font-size:.88rem;font-family:var(--font-body);
                      background:var(--clr-bg);color:var(--clr-text);outline:none;box-sizing:border-box"
               placeholder="Mínimo 6 caracteres" />
      </div>

      <!-- Confirmar contraseña -->
      <div style="margin-bottom:1.5rem">
        <label style="font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--clr-muted);display:block;margin-bottom:.4rem">
          Confirmar contraseña <span style="color:#e74c3c">*</span>
        </label>
        <input type="password" id="regPassword2" autocomplete="new-password"
               style="width:100%;padding:.7rem .875rem;border:1px solid var(--clr-border);
                      border-radius:var(--radius);font-size:.88rem;font-family:var(--font-body);
                      background:var(--clr-bg);color:var(--clr-text);outline:none;box-sizing:border-box"
               placeholder="Repetí la contraseña" />
      </div>

      <button id="btnRegister" onclick="doRegister()"
              style="width:100%;padding:1rem;background:var(--clr-text);color:#fff;border:none;
                     border-radius:var(--radius);font-family:var(--font-body);font-size:.82rem;
                     font-weight:500;letter-spacing:.14em;text-transform:uppercase;cursor:pointer">
        Crear cuenta
      </button>

    </div>

    <!-- Link a login -->
    <p style="text-align:center;margin-top:1.25rem;font-size:.85rem;color:var(--clr-muted)">
      ¿Ya tenés cuenta?
      <a href="{% url 'login' %}" style="color:var(--clr-text);font-weight:500">Iniciá sesión</a>
    </p>

  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/register.js' %}"></script>
{% endblock %}
